name: E2E

# The end-to-end harness (tests/e2e) is heavy — it builds a Laravel app image and boots a
# real Restate runtime via docker compose — so it does NOT run on every PR. It runs on
# pushes to main, on demand, weekly, and on PRs labelled `e2e`. GitHub runners have Docker
# and AVX2, so the bidi-capable Restate >= 1.7 runtime works here.
on:
  push:
    branches: [main]
  pull_request:
    types: [labeled]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Laravel e2e (docker compose + real Restate)
    # On PRs, only run when labelled `e2e` (too slow to gate every PR); always run on
    # push/dispatch/schedule.
    if: github.event_name != 'pull_request' || github.event.label.name == 'e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Run the e2e harness (builds the app image, boots Restate, drives the ingress)
        run: make e2e
        env:
          RESTATE_IMAGE: docker.io/restatedev/restate:1.7.0
